environment:
  sdk: '>=2.19.6 <3.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  firebase_crashlytics: ^4.0.1
  provider: ^6.1.1
  animate_do: ^3.0.2
  internet_connection_checker: ^1.0.0+1
  connectivity_plus: ^6.0.3
